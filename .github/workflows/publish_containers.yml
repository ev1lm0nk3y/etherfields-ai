name: Build and Publish Containers to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------------
      # Extract Metadata (Tags, Labels) for MCP Server
      # ------------------------------------------------------------------------
      - name: Extract metadata for Core MCP Server
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/etherfields-mcp-server
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ------------------------------------------------------------------------
      # Extract Metadata (Tags, Labels) for Voice Subsystem
      # ------------------------------------------------------------------------
      - name: Extract metadata for Voice Subsystem
        id: meta-voice
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/etherfields-voice-subsystem
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ------------------------------------------------------------------------
      # Build and Push MCP Server
      # ------------------------------------------------------------------------
      - name: Build and push Core MCP Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------------
      # Build and Push Voice Subsystem
      # ------------------------------------------------------------------------
      - name: Build and push Voice Subsystem
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.voice
          push: true
          tags: ${{ steps.meta-voice.outputs.tags }}
          labels: ${{ steps.meta-voice.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
